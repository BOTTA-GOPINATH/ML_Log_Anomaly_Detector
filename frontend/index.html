<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Anomaly Detector</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="icon">🛡️</div>
      <h1>Log Anomaly Detector</h1>
      <p>Upload your log dataset and detect anomalies using machine learning-powered analysis</p>
    </div>

    <!-- Upload Box -->
    <div class="upload-box" id="drop-area">
      <input type="file" id="fileInput" accept=".csv" hidden />
      
      <div class="upload-content">
        <div class="upload-icon">
  <!-- SVG ICON -->
  <svg width="50" height="50" viewBox="0 0 24 24" fill="none">
    <path d="M12 16V4M12 4L7 9M12 4L17 9" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="4" y="16" width="16" height="4" rx="2" stroke="#38bdf8" stroke-width="2"/>
  </svg>
</div>
        <h3>Drop your log file here</h3>
        <p>or click to browse • CSV files only</p>
      </div>
    </div>

    <!-- Button -->
    <button id="analyzeBtn" type="button">ANALYZE DATA</button>
    <!-- Status -->
    <p id="status"></p>

  </div>
  <script defer src="script.js"></script>
</body>
</html>
